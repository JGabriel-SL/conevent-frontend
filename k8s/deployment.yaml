apiVersion: apps/v1
kind: Deployment
metadata:
  name: conevent-frontend-deploy
  labels:
    app: conevent-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: conevent-frontend
  template:
    metadata:
      labels:
        app: conevent-frontend
    spec:
      containers:
      - name: conevent-frontend
        image: jgabrielsld/conevent-frontend:v2
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
