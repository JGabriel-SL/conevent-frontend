apiVersion: apps/v1
kind: Deployment
metadata:
  name: conevent-frontend-deploy
  labels:
    app: conevent-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: conevent-frontend
  template:
    metadata:
      labels:
        app: conevent-frontend
    spec:
      containers:
      - name: conevent-frontend
        image: jgabrielsld/conevent-frontend:v2
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
